<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CatLetter 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(170deg,#faf6f0,#f5ede1 40%,#f0e8d8);font-family:'Gowun Batang','Nanum Myeongjo',serif}
.wrap{max-width:440px;margin:0 auto;padding:24px 16px}
.header{text-align:center;margin-bottom:20px}
.paw{font-size:28px;margin-bottom:4px}
.title{font-family:'Nanum Myeongjo',serif;font-size:24px;font-weight:800;color:#4a3f35;letter-spacing:-0.5px}
.sub{font-size:12px;color:#a89b8a;margin-top:4px}
.card{background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border-radius:24px;padding:28px 22px;border:1px solid rgba(212,197,176,0.3);box-shadow:0 4px 24px rgba(120,100,70,0.06)}
.card-title{font-family:'Nanum Myeongjo',serif;font-size:19px;font-weight:800;color:#4a3f35;text-align:center;line-height:1.5;margin-bottom:6px}
.card-desc{font-size:13px;color:#a89b8a;text-align:center;margin-bottom:20px}
.error{background:#fff0f0;border:1px solid #f5c6c6;border-radius:12px;padding:12px;font-size:12px;color:#c44d3d;margin-bottom:16px;word-break:break-all}
.section{margin-bottom:18px;width:100%}
.label{display:block;font-size:13px;color:#5c5245;font-weight:700;margin-bottom:8px}
.req{color:#c9a87c;font-size:12px}
.input{width:100%;padding:13px 16px;border:1.5px solid #e0d5c4;border-radius:14px;font-size:14px;font-family:'Gowun Batang',serif;color:#4a3f35;background:rgba(255,255,255,0.5)}
.input:focus{outline:none;border-color:#c9a87c;box-shadow:0 0 0 3px rgba(201,168,124,0.12)}
.row{display:flex;gap:12px}
.photo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.photo-circle{width:110px;height:110px;border-radius:22px;overflow:hidden;border:2.5px dashed #d4c5b0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(250,246,240,0.8)}
.photo-circle img{width:100%;height:100%;object-fit:cover}
.photo-ph{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:#b8aa97}
.photo-hint{font-size:11px;color:#c4b9a8;margin-top:8px}
.grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:10px 16px;border-radius:14px;border:1.5px solid #e0d5c4;background:rgba(255,255,255,0.4);font-size:13px;font-weight:600;color:#7a6e60;cursor:pointer;font-family:'Gowun Batang',serif;transition:all .25s}
.chip.active{background:linear-gradient(135deg,#c9a87c,#b8956a);color:#fff;border:1.5px solid transparent;box-shadow:0 2px 8px rgba(180,150,110,0.25)}
.chip-sm{padding:8px 10px;font-size:11px;border-radius:12px;text-align:center}
.char-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.speech-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.speech-btn{padding:14px 12px;border-radius:14px;border:1.5px solid #e0d5c4;background:rgba(255,255,255,0.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.speech-btn.active{background:#faf0e2;border-color:#d4bc94}
.speech-lbl{font-size:15px;font-weight:700;color:#5c5245;font-family:'Gowun Batang',serif}
.speech-desc{font-size:11px;color:#b8aa97}
.mood-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mood-card{padding:14px 8px;border-radius:14px;border:1.5px solid #e0d5c4;background:rgba(255,255,255,0.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.mood-card.active{background:#faf0e2;border-color:#d4bc94}
.mood-emoji{font-size:24px}
.mood-label{font-size:12px;font-weight:600;color:#7a6e60;font-family:'Gowun Batang',serif}
.mood-card.active .mood-label{color:#7a6440;font-weight:700}
.btn{width:100%;padding:15px 24px;border-radius:14px;background:linear-gradient(135deg,#c9a87c,#b8956a);color:#fff;border:none;font-size:15px;font-weight:700;font-family:'Gowun Batang',serif;cursor:pointer}
.btn:disabled{opacity:0.4;cursor:default}
.btn-video{background:linear-gradient(135deg,#7c6daa,#6b5b9a)}
.btn-ghost{width:100%;padding:13px 8px;border-radius:14px;background:rgba(255,255,255,0.5);color:#a89b8a;border:1.5px solid #d4c5b0;font-size:13px;font-weight:600;font-family:'Gowun Batang',serif;cursor:pointer}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
.load-photo{width:100px;height:100px;border-radius:50px;overflow:hidden;border:3px solid #fff;box-shadow:0 6px 20px rgba(120,100,70,.12);margin-bottom:24px;animation:floaty 3s ease-in-out infinite}
.load-photo img{width:100%;height:100%;object-fit:cover}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c9a87c;margin:0 3px;animation:pulse 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.load-msg{font-size:14px;color:#7a6e60;font-style:italic}
.load-sub{font-size:12px;color:#a89b8a;margin-top:10px}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.letter-result{text-align:center}
.letter-photo{width:180px;height:180px;border-radius:36px;overflow:hidden;border:4px solid #fff;box-shadow:0 12px 40px rgba(120,100,70,0.15);margin:0 auto 24px}
.letter-photo img{width:100%;height:100%;object-fit:cover}
.letter-paper{background:rgba(255,255,255,.7);border-radius:20px;padding:24px 20px;position:relative;margin-bottom:20px}
.wm{position:absolute;bottom:14px;right:4px;font-size:56px;opacity:.05;transform:rotate(-15deg);pointer-events:none}
.letter-to{font-size:12px;color:#c9a87c;font-weight:700;margin-bottom:16px;letter-spacing:1px}
.letter-line{font-size:15px;line-height:2;color:#4a3f35;font-family:'Gowun Batang',serif;word-break:keep-all;margin-bottom:2px}
.letter-from{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:20px;font-size:13px;color:#a89b8a;font-weight:700}
.vid-wrap{border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(120,100,70,.15);margin-bottom:16px}
.vid-wrap video{width:100%;display:block}
.player{position:relative;width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(120,100,70,.15)}
.player video{width:100%;height:100%;object-fit:cover}
.player-grad{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(transparent,rgba(0,0,0,.15) 25%,rgba(0,0,0,.55) 55%,rgba(0,0,0,.85) 100%);pointer-events:none}
.player-text{position:absolute;bottom:0;left:0;right:0;padding:0 24px 60px;z-index:2}
.p-to{font-size:13px;color:rgba(201,168,124,.9);font-weight:700;letter-spacing:1px;margin-bottom:14px;text-align:left}
.p-line{font-size:17px;line-height:2.2;color:rgba(255,255,255,.95);font-family:'Gowun Batang',serif;word-break:keep-all;margin:0;text-shadow:0 1px 8px rgba(0,0,0,.5);text-align:left}
.p-cursor{color:#c9a87c;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.p-from{font-size:14px;color:rgba(255,255,255,.7);font-weight:700;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.5);opacity:0;transition:opacity .8s}
.p-from.show{opacity:1}
.p-logo{position:absolute;top:12px;right:16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);font-family:'Nanum Myeongjo',serif;z-index:2}
.actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="header" id="hdr"><div class="paw">🐾</div><div class="title">CatLetter</div><p class="sub">우리 아이가 전하는 못 다 한 이야기</p></div>

  <div id="step-setup" class="card">
    <h2 class="card-title">우리 아이를 소개해주세요 🐱</h2>
    <p class="card-desc">이 아이의 이야기를 편지로 만들어줄게요</p>
    <div id="err" class="error hidden"></div>
    <div class="photo-wrap"><div class="photo-circle" onclick="document.getElementById('pf').click()"><div id="pp" class="photo-ph"><span style="font-size:32px">📷</span><span>사진 선택</span></div></div><input type="file" id="pf" accept="image/*" style="display:none"><p class="photo-hint">가장 좋아하는 사진 한 장</p></div>
    <div class="row"><div class="section" style="flex:1"><label class="label">이름 <span class="req">*</span></label><input class="input" id="i-name" placeholder="예) 조이, 나비..."></div><div class="section" style="flex:1"><label class="label">받는 사람 <span class="req">*</span></label><input class="input" id="i-rcpt" placeholder="예) 엄마, 지수..."></div></div>
    <div class="section"><label class="label">말투</label><div class="speech-grid" id="g-sp"></div></div>
    <div class="section"><label class="label">성격 <span class="req">*</span></label><div class="char-grid" id="g-ch"></div></div>
    <div class="section"><label class="label">지금 기분 <span class="req">*</span></label><div class="grid" id="g-mo"></div></div>
    <div class="section"><label class="label">전하고 싶은 마음 <span class="req">*</span></label><div class="mood-grid" id="g-ht"></div></div>
    <div class="section" id="motion-section"><label class="label">영상 움직임 스타일</label><div class="grid" id="g-mt"></div></div>
    <button class="btn" id="bt" disabled>✉️ 텍스트 편지 받기</button>
    <button class="btn btn-video" id="bv" disabled style="margin-top:10px">🎬 영상 편지 받기</button>
    <p style="font-size:11px;color:#b8aa97;text-align:center;margin-top:8px">텍스트 편지는 무료 · 영상 편지는 건당 ~270원</p>
  </div>

  <div id="step-loading" class="hidden"><div class="loading"><div id="lp" class="load-photo hidden"><img id="lpi" src=""></div><div class="dots"><span></span><span></span><span></span></div><p class="load-msg" id="lm">편지 쓰는 중...</p><p class="load-sub" id="ls"></p></div></div>

  <div id="step-text" class="hidden"><div class="letter-result"><div class="letter-photo" id="rph"></div><p style="font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:800;color:#4a3f35;margin-bottom:20px" id="rht"></p><div class="letter-paper"><div class="wm">🐾</div><p class="letter-to" id="rto"></p><div id="rlb"></div><div class="letter-from" id="rfm"></div></div><div class="actions"><button class="btn btn-video" id="buv">🎬 이 편지를 영상으로 만들기</button><button class="btn-ghost" id="bcp">📋 텍스트 복사</button><button class="btn-ghost" id="bn1">🐾 새 편지 쓰기</button></div></div></div>

  <div id="step-video" class="hidden">
    <div id="vp"><h2 style="font-size:18px;font-weight:800;color:#4a3f35;text-align:center;margin-bottom:16px" id="vti"></h2><div class="vid-wrap"><video id="vvd" loop muted autoplay playsinline></video></div><div class="letter-paper" style="margin-top:16px"><p class="letter-to" id="vto"></p><div id="vlb"></div><div class="letter-from" id="vfm"></div></div><button class="btn" id="bpo">💌 영상 + 편지 합쳐서 보기</button></div>
    <div id="vo" class="hidden"><div class="player"><video id="ovd" loop muted autoplay playsinline></video><div class="player-grad"></div><div class="player-text"><p class="p-to" id="oto"></p><div id="olb"></div><p class="p-from" id="ofm"></p></div><div class="p-logo">CatLetter 🐾</div></div><div id="oa" class="actions hidden"><button class="btn" id="brp">▶ 다시 재생</button><a class="btn-ghost" id="bdl" download style="text-align:center;text-decoration:none;display:block">📥 영상 다운로드</a><button class="btn-ghost" id="bn2">🐾 새 편지 쓰기</button></div></div>
  </div>
</div>
<script>
const CH=[{l:"소심한",e:"🐾"},{l:"활발한",e:"⚡"},{l:"조용한",e:"🤫"},{l:"말괄량이",e:"😜"},{l:"수다쟁이",e:"🗣️"},{l:"잠꾸러기",e:"😴"},{l:"호기심 만땅",e:"🔍"},{l:"욕심꾸러기",e:"👑"},{l:"먹보",e:"🍗"},{l:"용감한",e:"🦁"},{l:"새침데기",e:"😼"},{l:"댕냥이",e:"🐶"},{l:"심술쟁이",e:"😤"},{l:"깔끔한",e:"✨"},{l:"시크한",e:"😎"},{l:"대범한",e:"🌊"}];
const MO=[{l:"기분좋아",e:"😊"},{l:"행복해",e:"🥰"},{l:"만족해",e:"☺️"},{l:"삐졌어",e:"😤"},{l:"화났어",e:"😡"},{l:"슬퍼",e:"🥺"}];
const HT=[{l:"보고싶어요",e:"🥺",p:"그리워하거나 기다리는 마음"},{l:"감사해요",e:"🌸",p:"고맙고 감사한 마음"},{l:"사랑해요",e:"💕",p:"따뜻한 애정"},{l:"응원해요",e:"💪",p:"힘내라는 응원"},{l:"놀아주세요",e:"🎾",p:"같이 놀고 싶은 마음"},{l:"축하해요",e:"🎉",p:"축하"},{l:"일상",e:"☀️",p:"평소 하고 싶은 말"}];
const SP=[{l:"반말",d:"나 ~해, ~거야"},{l:"존댓말",d:"저 ~해요, ~거예요"}];
const MT=[{l:"조용히 숨쉬기",e:"😌",p:"A cat breathing softly, minimal gentle movement, calm and peaceful, warm indoor lighting, cinematic"},{l:"고개 기울이기",e:"😺",p:"A cat tilting its head very slightly to one side, curious gentle expression, soft breathing, warm indoor lighting, cinematic"},{l:"느린 눈 깜빡임",e:"😽",p:"A cat with eyes slowly closing and opening in a relaxed slow blink, very minimal body movement, warm soft lighting, cinematic"},{l:"천천히 다가오기",e:"🐱",p:"A cat walking slowly and gracefully toward the camera, soft natural movement, warm indoor lighting, cinematic"}];
const CG={"소심한":"겁많고 조심스러움","활발한":"에너지 넘침","조용한":"말수 적음","말괄량이":"장난기 넘침","수다쟁이":"말 정말 많음","잠꾸러기":"항상 졸림","호기심 만땅":"모든 게 궁금","욕심꾸러기":"다 내 거","먹보":"밥으로 표현","용감한":"겁없고 당당","새침데기":"관심있는데 티 안 냄","댕냥이":"잘 따름","심술쟁이":"투덜투덜 귀여움","깔끔한":"정돈 좋아함","시크한":"말 극도로 짧음","대범한":"뭐든 괜찮음"};
const LM=["꾹꾹이 하면서 생각하는 중...","기지개 펴는 중...","하고 싶은 말을 정리하는 중...","솔직해지려고 용기 내는 중...","집사 몰래 편지를 쓰는 중...","발로 편지지를 꺼내는 중..."];
let S={ph:null,pb:null,nm:"",rc:"",sp:"반말",ch:null,mo:null,ht:null,mt:MT[0],lt:"",vu:""};
function jo(n){if(!n)return"";const c=n.charCodeAt(n.length-1);return n+((c>=0xAC00&&c<=0xD7A3&&(c-0xAC00)%28!==0)?"이가":"가");}
function bp(){
  const sg=S.sp==="반말"?'반말 ("나","~해","~거야")':'존댓말 ("저","~해요","~거예요")';
  const h=["느린 눈 깜빡임","새벽에 얼굴 밟기","화장실까지 따라가기","박스에 들어가기","앞발로 톡톡 건드리기","무릎 점령하기","그루밍 해주기","코 갖다 대기","빈자리 냄새 맡기","돌아오면 야옹거리기","반가운 척 안 하기","밥그릇 앞에서 울기","간식 봉지 소리 알기","옷 위에 눕기","꼬리로 기분 표현하기"];
  const p=[];const c=[...h];for(let i=0;i<3;i++){const x=Math.floor(Math.random()*c.length);p.push(c.splice(x,1)[0]);}
  return `당신은 "${S.nm}"이라는 고양이입니다.\n성격: ${S.ch} — ${CG[S.ch]||""}\n${sg}\n받는 사람: ${S.rc}\n기분: ${S.mo}\n전하고 싶은 마음: ${S.ht.l} (${S.ht.p})\n행동 키워드 (2개 이상 활용): ${p.join(", ")}\n\n★ 50~90자. 3~5문장. 아주 짧게. ★\n\n규칙:\n1. 3~5살 아이처럼. 2~5단어 짧은 문장.\n2. "사랑해" "고마워" "보고싶어" 직접 명명 금지.\n3. 진심은 새어나오는 것.\n4. 같은 말 반복. "..." 최대 1번.\n5. 엉뚱한 아기 논리 하나.\n6. 물건/장소 지어내기 금지. 외출 금지.\n7. "당신" 금지 → "${S.rc}" 사용.\n8. 부정적/걱정 유발 금지. 따뜻한 내용만.\n9. "죽어/죽겠" 금지.\n10. 줄바꿈 호흡. 본문만. 설명 없이.`;
}
function rsp(){const el=document.getElementById("g-sp");el.innerHTML="";SP.forEach(s=>{const b=document.createElement("button");b.className="speech-btn"+(S.sp===s.l?" active":"");b.innerHTML='<span class="speech-lbl">'+s.l+'</span><span class="speech-desc">'+s.d+'</span>';b.onclick=()=>{S.sp=s.l;rsp();};el.appendChild(b);});}
function rc(id,items,key,cls){const el=document.getElementById(id);el.innerHTML="";items.forEach(item=>{const b=document.createElement("button");const a=key==="ht"?(S.ht&&S.ht.l===item.l):(S[key]===item.l);b.className=cls+(a?" active":"");if(cls.includes("mood-card"))b.innerHTML='<span class="mood-emoji">'+item.e+'</span><span class="mood-label">'+item.l+'</span>';else b.textContent=(item.e?item.e+" ":"")+item.l;b.onclick=()=>{if(key==="ht")S.ht=item;else S[key]=item.l;ra();ck();};el.appendChild(b);});}
function ra(){rsp();rc("g-ch",CH,"ch","chip chip-sm");rc("g-mo",MO,"mo","chip");rc("g-ht",HT,"ht","mood-card");
  const mel=document.getElementById("g-mt");mel.innerHTML="";MT.forEach(m=>{const b=document.createElement("button");b.className="chip"+(S.mt&&S.mt.l===m.l?" active":"");b.textContent=m.e+" "+m.l;b.onclick=()=>{S.mt=m;ra();};mel.appendChild(b);});
}
function ck(){document.getElementById("bt").disabled=!(S.nm&&S.rc&&S.ch&&S.mo&&S.ht);document.getElementById("bv").disabled=!(S.ph&&S.nm&&S.rc&&S.ch&&S.mo&&S.ht);}
document.getElementById("pf").addEventListener("change",function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(v){S.ph=v.target.result;S.pb=v.target.result;document.getElementById("pp").innerHTML='<img src="'+v.target.result+'">';ck();};r.readAsDataURL(f);});
document.getElementById("i-name").addEventListener("input",function(e){S.nm=e.target.value;ck();});
document.getElementById("i-rcpt").addEventListener("input",function(e){S.rc=e.target.value;ck();});
function ss(n){["step-setup","step-loading","step-text","step-video"].forEach(id=>document.getElementById(id).classList.toggle("hidden",id!=="step-"+n));}
async function gl(){
  document.getElementById("err").classList.add("hidden");ss("loading");
  if(S.ph){document.getElementById("lp").classList.remove("hidden");document.getElementById("lpi").src=S.ph;}
  document.getElementById("ls").textContent=jo(S.nm)+" 열심히 쓰고 있어요";

  }catch(e){document.getElementById("err").textContent="❌ "+e.message;document.getElementById("err").classList.remove("hidden");ss("setup");}
}

function sov(){
  document.getElementById("vp").classList.add("hidden");document.getElementById("vo").classList.remove("hidden");document.getElementById("oa").classList.add("hidden");
  document.getElementById("ovd").src=S.vu;document.getElementById("oto").textContent="To. "+S.rc;document.getElementById("ofm").textContent="From. "+S.nm+" 🐾";document.getElementById("ofm").classList.remove("show");document.getElementById("olb").innerHTML="";
  let pos=0;const lt=S.lt;
  setTimeout(function t(){if(pos>=lt.length){setTimeout(()=>{document.getElementById("ofm").classList.add("show");setTimeout(()=>document.getElementById("oa").classList.remove("hidden"),1500);},1000);return;}
    const ch=lt[pos];let d=55+Math.random()*35;if(ch==="\n")d=600+Math.random()*300;else if(".?!".includes(ch))d=300+Math.random()*200;pos++;
    const el=document.getElementById("olb");el.innerHTML="";lt.slice(0,pos).split("\n").forEach(l=>{const p=document.createElement("p");p.className="p-line";p.textContent=l||"\u00A0";el.appendChild(p);});
    if(pos<lt.length){const c=document.createElement("span");c.className="p-cursor";c.textContent="|";el.appendChild(c);}setTimeout(t,d);},1200);
}
