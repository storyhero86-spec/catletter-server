<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CatLetter 영상 편지</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(170deg,#faf6f0,#f5ede1 40%,#f0e8d8);padding:24px 16px;font-family:'Gowun Batang','Nanum Myeongjo',serif}
.wrap{max-width:440px;margin:0 auto}
h1{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:#4a3f35;text-align:center;margin:8px 0}
.desc{font-size:13px;color:#a89b8a;text-align:center;margin-bottom:24px}
.error{background:#fff0f0;border:1px solid #f5c6c6;border-radius:12px;padding:12px;font-size:12px;color:#c44d3d;margin-bottom:16px;word-break:break-all}
.section{margin-bottom:16px;width:100%}
.label{display:block;font-size:13px;color:#5c5245;font-weight:700;margin-bottom:8px}
.req{color:#c9a87c}
.input{width:100%;padding:12px 14px;border:1.5px solid #e0d5c4;border-radius:14px;font-size:14px;font-family:inherit;color:#4a3f35;background:rgba(255,255,255,.5)}
.input:focus{outline:none;border-color:#c9a87c}
.row{display:flex;gap:12px}
.photo-area{width:160px;height:160px;border-radius:20px;border:2.5px dashed #d4c5b0;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:rgba(255,255,255,.4)}
.photo-area img{width:100%;height:100%;object-fit:cover}
.photo-ph{text-align:center;color:#b8aa97;font-size:14px;line-height:2}
.grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid #e0d5c4;background:rgba(255,255,255,.4);font-size:13px;color:#7a6e60;cursor:pointer;font-family:inherit;transition:all .2s}
.chip.active{background:#faf0e2;border-color:#d4bc94;font-weight:700;color:#5c5245}
.chip-sm{padding:8px 10px;font-size:11px;border-radius:12px;text-align:center}
.char-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.btn{width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,#c9a87c,#b8956a);color:#fff;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:.4;cursor:default}
.btn-sub{width:100%;padding:12px;border-radius:14px;background:rgba(255,255,255,.5);color:#a89b8a;border:1.5px solid #d4c5b0;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px}
.btn-dl{display:block;padding:14px;border-radius:14px;background:rgba(255,255,255,.5);color:#7a6e60;border:1.5px solid #d4c5b0;font-size:14px;font-weight:600;text-align:center;text-decoration:none;font-family:inherit;margin-top:8px}
.cost{font-size:11px;color:#b8aa97;text-align:center;margin-top:8px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
.load-photo{width:100px;height:100px;border-radius:50px;overflow:hidden;border:3px solid #fff;box-shadow:0 6px 20px rgba(120,100,70,.12);margin-bottom:24px;animation:floaty 3s ease-in-out infinite}
.load-photo img{width:100%;height:100%;object-fit:cover}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c9a87c;margin:0 3px;animation:pulse 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.load-msg{font-size:14px;color:#7a6e60;font-weight:600;margin-top:16px}
.load-sub{font-size:12px;color:#a89b8a;margin-top:8px}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.result{text-align:center}
.result-title{font-size:18px;font-weight:800;color:#4a3f35;margin-bottom:16px}
.vid-wrap{border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(120,100,70,.15)}
.vid-wrap video{width:100%;display:block}
.letter-box{background:rgba(255,255,255,.6);border-radius:16px;padding:20px;margin:16px 0;text-align:left}
.lb-to{font-size:12px;color:#c9a87c;font-weight:700;margin-bottom:10px}
.lb-line{font-size:15px;line-height:2;color:#4a3f35;margin:0}
.lb-from{font-size:13px;color:#a89b8a;font-weight:700;text-align:center;margin-top:14px}
.player{position:relative;width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(120,100,70,.15)}
.player video{width:100%;height:100%;object-fit:cover}
.player-grad{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(transparent,rgba(0,0,0,.15) 25%,rgba(0,0,0,.55) 55%,rgba(0,0,0,.85) 100%);pointer-events:none}
.player-text{position:absolute;bottom:0;left:0;right:0;padding:0 24px 60px;z-index:2}
.p-to{font-size:13px;color:rgba(201,168,124,.9);font-weight:700;letter-spacing:1px;margin-bottom:14px;text-align:left}
.p-line{font-size:17px;line-height:2.2;color:rgba(255,255,255,.95);font-family:'Gowun Batang',serif;word-break:keep-all;margin:0;text-shadow:0 1px 8px rgba(0,0,0,.5);text-align:left}
.p-cursor{color:#c9a87c;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.p-from{font-size:14px;color:rgba(255,255,255,.7);font-weight:700;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.5);opacity:0;transition:opacity .8s}
.p-from.show{opacity:1}
.p-logo{position:absolute;top:12px;right:16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);font-family:'Nanum Myeongjo',serif;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- 설정 -->
  <div id="step-setup">
    <div style="font-size:36px;text-align:center">🎬🐾</div>
    <h1>CatLetter 영상 편지</h1>
    <p class="desc">사진 넣고 선택하면 AI가 알아서 만들어요</p>
    <div id="error-box" class="error hidden"></div>
    
    <div class="section">
      <label class="label">고양이 사진 <span class="req">*</span></label>
      <div class="photo-area" onclick="document.getElementById('photo-input').click()">
        <div id="photo-preview" class="photo-ph">📷<br>사진 선택</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none">
    </div>
    
    <div class="row">
      <div class="section" style="flex:1"><label class="label">이름 <span class="req">*</span></label><input class="input" id="pet-name" placeholder="조이"></div>
      <div class="section" style="flex:1"><label class="label">받는 사람 <span class="req">*</span></label><input class="input" id="rcpt-name" placeholder="엄마"></div>
    </div>
    
    <div class="section"><label class="label">말투</label><div class="grid" id="speech-grid"></div></div>
    <div class="section"><label class="label">성격 <span class="req">*</span></label><div class="char-grid" id="char-grid"></div></div>
    <div class="section"><label class="label">기분 <span class="req">*</span></label><div class="grid" id="mood-grid"></div></div>
    <div class="section"><label class="label">전하고 싶은 마음 <span class="req">*</span></label><div class="grid" id="heart-grid"></div></div>
    
    <button class="btn" id="btn-generate" disabled>🎬 영상 편지 만들기</button>
    <p class="cost">버튼 한 번이면 끝! (~30초 소요, ~275원)</p>
  </div>
  
  <!-- 로딩 -->
  <div id="step-loading" class="hidden">
    <div class="loading">
      <div id="loading-photo" class="load-photo hidden"><img id="loading-photo-img" src=""></div>
      <div class="dots"><span></span><span></span><span></span></div>
      <p class="load-msg" id="loading-msg">편지 쓰는 중...</p>
      <p class="load-sub" id="loading-sub"></p>
    </div>
  </div>
  
  <!-- 결과 -->
  <div id="step-result" class="hidden">
    <div class="result">
      <div id="result-preview">
        <h2 class="result-title" id="result-title"></h2>
        <div class="vid-wrap"><video id="result-video" loop muted autoplay playsinline></video></div>
        <div class="letter-box" id="letter-box"></div>
        <button class="btn" id="btn-play-overlay">💌 영상 + 편지 합쳐서 보기</button>
      </div>
      <div id="result-player" class="hidden">
        <div class="player">
          <video id="player-video" loop muted autoplay playsinline></video>
          <div class="player-grad"></div>
          <div class="player-text">
            <p class="p-to" id="player-to"></p>
            <div id="player-letter"></div>
            <p class="p-from" id="player-from"></p>
          </div>
          <div class="p-logo">CatLetter 🐾</div>
        </div>
        <div id="player-actions" class="actions hidden">
          <button class="btn" id="btn-replay">▶ 다시 재생</button>
          <a class="btn-dl" id="btn-download" download>📥 영상 다운로드</a>
          <button class="btn-sub" id="btn-new">🏠 새로 만들기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CHARS = [
  {l:"소심한",e:"🐾"},{l:"활발한",e:"⚡"},{l:"조용한",e:"🤫"},{l:"말괄량이",e:"😜"},
  {l:"수다쟁이",e:"🗣️"},{l:"잠꾸러기",e:"😴"},{l:"호기심 만땅",e:"🔍"},{l:"욕심꾸러기",e:"👑"},
  {l:"먹보",e:"🍗"},{l:"용감한",e:"🦁"},{l:"새침데기",e:"😼"},{l:"댕냥이",e:"🐶"},
  {l:"심술쟁이",e:"😤"},{l:"깔끔한",e:"✨"},{l:"시크한",e:"😎"},{l:"대범한",e:"🌊"},
];
const MOODS = [{l:"기분좋아",e:"😊"},{l:"행복해",e:"🥰"},{l:"만족해",e:"☺️"},{l:"삐졌어",e:"😤"},{l:"화났어",e:"😡"},{l:"슬퍼",e:"🥺"}];
const HEARTS = [
  {l:"보고싶어요",e:"🥺",p:"누군가를 그리워하거나 기다리는 마음"},
  {l:"감사해요",e:"🌸",p:"고맙고 감사한 마음 — 직접 말하지 않고 행동으로"},
  {l:"사랑해요",e:"💕",p:"따뜻한 애정 — 직접 말하지 않고 행동으로"},
  {l:"응원해요",e:"💪",p:"힘내라는 응원"},
  {l:"놀아주세요",e:"🎾",p:"같이 놀고 싶은 마음"},
  {l:"축하해요",e:"🎉",p:"축하"},
  {l:"일상",e:"☀️",p:"평소 하고 싶은 말"},
];
const SPEECHES = [{l:"반말",v:"반말"},{l:"존댓말",v:"존댓말"}];
const CG={"소심한":"겁많고 조심스러움","활발한":"에너지 넘침","조용한":"말수 적음","말괄량이":"장난기 넘침","수다쟁이":"말 많음","잠꾸러기":"항상 졸림","호기심 만땅":"모든 게 궁금","욕심꾸러기":"다 내 거","먹보":"밥으로 표현","용감한":"겁없고 당당","새침데기":"관심있는데 티 안 냄","댕냥이":"잘 따름","심술쟁이":"투덜대지만 따뜻","깔끔한":"정돈 좋아함","시크한":"말 극도로 짧음","대범한":"뭐든 괜찮음"};
const LOADMSGS = ["꾹꾹이 하면서 생각하는 중...","기지개 펴는 중...","하고 싶은 말을 정리하는 중...","솔직해지려고 용기 내는 중...","집사 몰래 편지를 쓰는 중..."];

let state = { photoURL: null, photoBase64: null, petName: "", rcptName: "", speech: "반말", char: null, mood: null, heart: null, letter: "", videoUrl: "" };

function josa(n,t){if(!n)return"";const c=n.charCodeAt(n.length-1);const h=c>=0xAC00&&c<=0xD7A3&&(c-0xAC00)%28!==0;return n+({"이가/가":h?"이가":"가","이를/를":h?"이를":"를"}[t]||"");}

function buildPrompt(){
  return `당신은 "${state.petName}"이라는 고양이입니다.
성격: ${state.char}
${state.speech==="반말"?'반말 ("나","~해","~거야")':'존댓말 ("저","~요","~해요","~거예요")'}
받는 사람: ${state.rcptName}
기분: ${state.mood}
전하고 싶은 마음: ${state.heart.l} (${state.heart.p})

안전: "죽어/죽겠" 의료판단 부정적 내용 금지

성격과 기분에 맞게 짧은 편지. 3~5살 아이처럼.
성격: ${CG[state.char]||""}
50~90자. 3~5문장. "..." 최대 1번.
물건/장소 지어내기 금지. 감정 직접 명명 금지.
"당신"→"${state.rcptName}". 평소의 마음. 외출 금지. 따뜻한 내용만.
줄바꿈 호흡. 본문만. 설명 없이.`;
}

// 칩 렌더
function renderChips(containerId, items, key, isChar) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    const isActive = key === "heart" ? (state.heart && state.heart.l === item.l) : (state[key] === (item.l || item.v));
    btn.className = "chip" + (isChar ? " chip-sm" : "") + (isActive ? " active" : "");
    btn.textContent = (item.e ? item.e + " " : "") + item.l;
    btn.onclick = () => { if(key === "heart"){ state.heart = item; } else { state[key] = item.l || item.v; } renderAll(); checkReady(); };
    el.appendChild(btn);
  });
}
function renderAll() {
  renderChips("speech-grid", SPEECHES, "speech", false);
  renderChips("char-grid", CHARS, "char", true);
  renderChips("mood-grid", MOODS, "mood", false);
  renderChips("heart-grid", HEARTS, "heart", false);
}
function checkReady() {
  document.getElementById("btn-generate").disabled = !(state.photoURL && state.petName && state.rcptName && state.char && state.mood && state.heart);
}

// 사진
document.getElementById("photo-input").addEventListener("change", function(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    state.photoURL = ev.target.result;
    state.photoBase64 = ev.target.result;
    document.getElementById("photo-preview").innerHTML = '<img src="'+ev.target.result+'" style="width:100%;height:100%;object-fit:cover">';
    checkReady();
  };
  reader.readAsDataURL(f);
});
document.getElementById("pet-name").addEventListener("input", function(e) { state.petName = e.target.value; checkReady(); });
document.getElementById("rcpt-name").addEventListener("input", function(e) { state.rcptName = e.target.value; checkReady(); });

// 화면 전환
function showStep(name) {
  document.getElementById("step-setup").classList.toggle("hidden", name !== "setup");
  document.getElementById("step-loading").classList.toggle("hidden", name !== "loading");
  document.getElementById("step-result").classList.toggle("hidden", name !== "result");
}

// 생성
document.getElementById("btn-generate").addEventListener("click", async function() {
  showStep("loading");
  document.getElementById("error-box").classList.add("hidden");
  if (state.photoURL) {
    document.getElementById("loading-photo").classList.remove("hidden");
    document.getElementById("loading-photo-img").src = state.photoURL;
  }
  document.getElementById("loading-sub").textContent = josa(state.petName, "이가/가") + " 열심히 준비하고 있어요";
  
  let msgIdx = 0;
  const msgInterval = setInterval(() => { msgIdx = (msgIdx + 1) % LOADMSGS.length; document.getElementById("loading-msg").textContent = LOADMSGS[msgIdx]; }, 2800);
  
  try {
    // 1. 편지 생성
    document.getElementById("loading-msg").textContent = "편지 쓰는 중...";
    const letterRes = await fetch("/.netlify/functions/generate-letter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: buildPrompt() }),
    });
    const letterData = await letterRes.json();
    if (!letterRes.ok || letterData.error) throw new Error("편지: " + (letterData.error || letterRes.status));
    state.letter = letterData.letter;
    
    // 2. 사진 업로드
    document.getElementById("loading-msg").textContent = "사진 올리는 중...";
    const uploadRes = await fetch("/.netlify/functions/upload-image", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image_base64: state.photoBase64 }),
    });
    if (!uploadRes.ok) throw new Error("사진 업로드 실패");
    const uploadData = await uploadRes.json();
    if (uploadData.error) throw new Error(uploadData.error);
    
    // 3. 영상 생성 시작
    document.getElementById("loading-msg").textContent = "AI가 고양이를 움직이게 하는 중...";
    const startRes = await fetch("/.netlify/functions/start-video", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image_url: uploadData.image_url }),
    });
    if (!startRes.ok) throw new Error("영상 생성 시작 실패");
    const startData = await startRes.json();
    if (startData.error) throw new Error(startData.error);
    if (!startData.status_url) throw new Error("status_url 없음: " + JSON.stringify(startData).slice(0, 200));
    
    // 4. 폴링
    let elapsed = 0;
    while (elapsed < 180) {
      await new Promise(r => setTimeout(r, 4000));
      elapsed += 4;
      document.getElementById("loading-msg").textContent = "영상 만드는 중... (" + elapsed + "초)";
      
      try {
        const checkRes = await fetch("/.netlify/functions/check-video", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status_url: startData.status_url, response_url: startData.response_url }),
        });
        const checkData = await checkRes.json();
        document.getElementById("loading-sub").textContent = "상태: " + JSON.stringify(checkData).slice(0, 100);
        
        if (checkData.status === "COMPLETED" && checkData.video_url) {
          state.videoUrl = checkData.video_url;
          clearInterval(msgInterval);
          showResult();
          return;
        }
        if (checkData.status === "FAILED") throw new Error("영상 생성 실패");
      } catch(checkErr) {
        document.getElementById("loading-sub").textContent = "체크 에러: " + checkErr.message;
      }
    }
    throw new Error("시간 초과 (3분)");
  } catch (e) {
    clearInterval(msgInterval);
    document.getElementById("error-box").textContent = "❌ " + e.message;
    document.getElementById("error-box").classList.remove("hidden");
    showStep("setup");
  }
});

function showResult() {
  showStep("result");
  document.getElementById("result-preview").classList.remove("hidden");
  document.getElementById("result-player").classList.add("hidden");
  
  document.getElementById("result-title").textContent = "✨ " + josa(state.petName, "이가/가") + " 움직여요!";
  document.getElementById("result-video").src = state.videoUrl;
  
  const box = document.getElementById("letter-box");
  box.innerHTML = '<p class="lb-to">To. ' + state.rcptName + '</p>';
  state.letter.split("\n").forEach(l => { const p = document.createElement("p"); p.className = "lb-line"; p.textContent = l || "\u00A0"; box.appendChild(p); });
  box.innerHTML += '<p class="lb-from">From. ' + state.petName + ' 🐾</p>';
  
  document.getElementById("btn-download").href = state.videoUrl;
  document.getElementById("btn-download").download = state.petName + "_영상편지.mp4";
}

// 편지 오버레이
document.getElementById("btn-play-overlay").addEventListener("click", startOverlay);
document.getElementById("btn-replay").addEventListener("click", startOverlay);

function startOverlay() {
  document.getElementById("result-preview").classList.add("hidden");
  document.getElementById("result-player").classList.remove("hidden");
  document.getElementById("player-actions").classList.add("hidden");
  
  document.getElementById("player-video").src = state.videoUrl;
  document.getElementById("player-to").textContent = "To. " + state.rcptName;
  document.getElementById("player-from").textContent = "From. " + state.petName + " 🐾";
  document.getElementById("player-from").classList.remove("show");
  document.getElementById("player-letter").innerHTML = "";
  
  let pos = 0;
  const letter = state.letter;
  
  setTimeout(function tick() {
    if (pos >= letter.length) {
      setTimeout(() => {
        document.getElementById("player-from").classList.add("show");
        setTimeout(() => document.getElementById("player-actions").classList.remove("hidden"), 1500);
      }, 1000);
      return;
    }
    const ch = letter[pos];
    let delay = 55 + Math.random() * 35;
    if (ch === "\n") delay = 600 + Math.random() * 300;
    else if (".?!".includes(ch)) delay = 300 + Math.random() * 200;
    pos++;
    
    const visible = letter.slice(0, pos);
    const el = document.getElementById("player-letter");
    el.innerHTML = "";
    visible.split("\n").forEach(l => { const p = document.createElement("p"); p.className = "p-line"; p.textContent = l || "\u00A0"; el.appendChild(p); });
    if (pos < letter.length) { const cur = document.createElement("span"); cur.className = "p-cursor"; cur.textContent = "|"; el.appendChild(cur); }
    
    setTimeout(tick, delay);
  }, 1200);
}

// 새로 만들기
document.getElementById("btn-new").addEventListener("click", function() {
  state = { photoURL: null, photoBase64: null, petName: "", rcptName: "", speech: "반말", char: null, mood: null, heart: null, letter: "", videoUrl: "" };
  document.getElementById("pet-name").value = "";
  document.getElementById("rcpt-name").value = "";
  document.getElementById("photo-preview").innerHTML = "📷<br>사진 선택";
  document.getElementById("error-box").classList.add("hidden");
  renderAll();
  checkReady();
  showStep("setup");
});

// 초기화
renderAll();
